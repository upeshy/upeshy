<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;padding:20px;}
h1{color:#38bdf8;}
h2{color:#facc15;margin-top:30px;}

input,textarea,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  border:none;
}

button{
  padding:10px;
  border:none;
  background:#0ea5e9;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

button:hover{background:#0284c7;}

.card{
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

img{
  width:60px;
  height:60px;
  border-radius:50%;
}

.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
}

.modal-content{
  background:white;
  color:black;
  padding:20px;
  margin:50px auto;
  width:90%;
  max-width:400px;
  border-radius:10px;
}

.close{
  float:right;
  cursor:pointer;
  color:red;
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>
<body>

<h1>🔥 Admin Dashboard</h1>

<!-- STUDENTS -->
<h2>📚 Students</h2>

<input id="s_name" placeholder="Name">
<input id="s_phone" placeholder="Phone">
<input id="s_course" placeholder="Course">
<input id="s_photo" placeholder="Photo URL">
<button onclick="addStudent()">Add Student</button>

<div id="studentList"></div>

<!-- TEACHERS -->
<h2>👨‍🏫 Teachers</h2>

<select id="teacherSelect">
<option value="teacher1">Teacher 1</option>
<option value="teacher2">Teacher 2</option>
<option value="teacher3">Teacher 3</option>
</select>

<input id="t_name" placeholder="Name">
<input id="t_subject" placeholder="Subject">
<input id="t_image" placeholder="Image URL">

<button onclick="saveTeacher()">Save Teacher</button>

<!-- UPDATES -->
<h2>📢 Updates</h2>

<input id="u_title" placeholder="Title">
<input id="u_text" placeholder="Text">
<button onclick="addUpdate()">Add Update</button>

<div id="updateList"></div>

<!-- ABOUT -->
<h2>📘 About</h2>

<textarea id="aboutText"></textarea>
<button onclick="saveAbout()">Save</button>

<!-- POPUP -->
<h2>🎯 Popup</h2>

<input id="popupImage" placeholder="Image URL">
<input id="popupTitle" placeholder="Title">
<input id="popupText" placeholder="Text">
<button onclick="savePopup()">Save Popup</button>

<!-- TOPBAR -->
<h2>🔔 Topbar</h2>

<input id="topbarInput">
<button onclick="saveTopbar()">Save</button>

<!-- EDIT MODAL -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <span class="close" onclick="closeEditModal()">✖</span>
    <h3>Edit Student</h3>

    <input id="edit_name">
    <input id="edit_phone">

    <button onclick="updateStudent()">Update</button>
  </div>
</div>

<script>

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCJbmgvBuJ-PP2U9kf_hJQ-rMWtAd551sA",
  authDomain: "game-bbdc6.firebaseapp.com",
  projectId: "game-bbdc6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let editStudentId = null;

// ================= STUDENTS =================
function addStudent(){

  if(!s_name.value || !s_phone.value){
    alert("Name & Phone required ❌");
    return;
  }

  db.collection("students").add({
    name: s_name.value,
    phone: s_phone.value,
    course: s_course.value,
    photo: s_photo.value
  })
  .then(()=>{
    alert("Added ✅");

    // clear inputs
    s_name.value="";
    s_phone.value="";
    s_course.value="";
    s_photo.value="";

    loadStudents();
  })
  .catch(err=>alert(err.message));
}

function loadStudents(){
  studentList.innerHTML="Loading...";

  db.collection("students").get().then(data=>{
    studentList.innerHTML="";

    data.forEach(d=>{
      let s = d.data();

      studentList.innerHTML += `
        <div class="card">
          <b>${s.name || ""}</b> (${s.course || ""})<br>
          📞 ${s.phone || ""}<br>
          <img src="${s.photo || "https://via.placeholder.com/60"}"><br>
          <button onclick="openEditModal('${d.id}')">Edit</button>
          <button onclick="deleteStudent('${d.id}')">Delete</button>
        </div>
      `;
    });
  });
}

function deleteStudent(id){
  if(confirm("Delete?")){
    db.collection("students").doc(id).delete()
    .then(()=>loadStudents());
  }
}

function openEditModal(id){
  editStudentId = id;

  db.collection("students").doc(id).get().then(doc=>{
    let s = doc.data();

    edit_name.value = s.name;
    edit_phone.value = s.phone;

    editModal.style.display="block";
  });
}

function updateStudent(){
  db.collection("students").doc(editStudentId).update({
    name: edit_name.value,
    phone: edit_phone.value
  })
  .then(()=>{
    alert("Updated ✅");
    closeEditModal();
    loadStudents();
  });
}

function closeEditModal(){
  editModal.style.display="none";
}

// ================= TEACHERS =================
function saveTeacher(){
  db.collection("teachers").doc(teacherSelect.value).set({
    name: t_name.value,
    subject: t_subject.value,
    image: t_image.value
  })
  .then(()=>alert("Teacher Saved ✅"));
}

// ================= UPDATES =================
function addUpdate(){

  if(!u_title.value){
    alert("Title required ❌");
    return;
  }

  db.collection("updates").add({
    title: u_title.value,
    text: u_text.value
  })
  .then(()=>{
    u_title.value="";
    u_text.value="";
    loadUpdates();
  });
}

function loadUpdates(){
  updateList.innerHTML="Loading...";

  db.collection("updates").get().then(data=>{
    updateList.innerHTML="";

    data.forEach(d=>{
      let u = d.data();

      updateList.innerHTML += `
        <div class="card">
          <b>${u.title}</b><br>${u.text}
          <button onclick="deleteUpdate('${d.id}')">Delete</button>
        </div>
      `;
    });
  });
}

function deleteUpdate(id){
  db.collection("updates").doc(id).delete()
  .then(()=>loadUpdates());
}

// ================= SETTINGS =================
function saveAbout(){
  db.collection("settings").doc("about").set({
    text: aboutText.value
  }).then(()=>alert("Saved ✅"));
}

function savePopup(){
  db.collection("settings").doc("popup").set({
    image: popupImage.value,
    title: popupTitle.value,
    text: popupText.value
  }).then(()=>alert("Popup Saved ✅"));
}

function saveTopbar(){
  db.collection("settings").doc("topbar").set({
    text: topbarInput.value
  }).then(()=>alert("Topbar Saved ✅"));
}

// LOAD
loadStudents();
loadUpdates();

</script>

</body>
</html>
